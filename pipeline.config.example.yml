# pipeline.config.yml — the ONLY repo-specific file the skills need.
# Copy this to pipeline.config.yml and edit. Skills read these values instead of
# hardcoding anything (they reference them as {{verify}}, {{vcs}}, ...).

# The single command that must pass before a work package can ship.
# Tests for a library, `terraform plan` + policy for infra, E2E for an app —
# what "green" means is up to you, as long as one command produces it.
verify: "npm run verify"

# The scale every planning + critique phase calibrates rigor to (over- and
# under-building both count as defects). /work-planning re-confirms it each run
# and HALTs if unclear. Overridable per-track and per-work-package.
#   prototype  — spike / throwaway: speed, minimal tests, no hardening
#   mvp        — small / early product: happy path + key edges, light hardening
#   production — real users & data: full tests, error handling, security, observability
#   critical   — regulated / high blast radius: exhaustive rigor, audit trails
engineering:
  tier: mvp

# Where the code lives. Used to scope reviews.
paths:
  source: ["src/**"]
  tests: ["**/*.test.*"]
  docs: ["docs/**"]

# Path + conventions of your design system. null → the design + design-critique
# + visual-polish phases are skipped (backend / infra / library repos).
designSystem: null
# designSystem:
#   path: "src/design-system"
#   tokens: "src/design-system/tokens.css"

# Version control + where "ship" opens PRs and waits for CI. github | gitlab | none
vcs: github

# Model ROLES, not vendor ids. Each tool maps these to its own models.
# high = most capable (design, review). fast = quick (build).
models:
  design: high
  review: high
  build: fast

# Project rules — OPTIONAL files that let THIS repo steer specific skills without
# forking them. Each key below is a fixed rule "slot" the skills know to look for;
# point it at a markdown file of binding project guidance and the relevant skill
# reads it before acting (a project rule WINS over the skill's generic advice on
# conflict). Omit / leave null any slot you don't need — skills skip absent slots
# silently. This is how repo-specific knowledge (test layout, where code lives,
# component budget, reuse-before-build, type conventions, security policy) reaches
# the otherwise-generic skills. Which skill reads which slot is noted after each.
rules:
  code: null           # language / type / style conventions — write-code, architecture, review
  testing: null        # what counts as a test, layout, lanes/fixtures, combined/integration seam — write-tests, review
  architecture: null   # architecture invariants & conventions — architecture, architecture-critique, review
  design-system: null  # component budget, tokens, reuse-before-build, promotion — design, design-critique, write-code, review
  frontend: null       # client / UI conventions — design, write-code, review
  visual: null         # visual fidelity / regression policy — design-critique, review
  aesthetics: null     # aesthetic quality bar — design, design-critique
  security: null       # security policy / threat model — review
  docs: null           # documentation voice & conventions — write-docs
# Example (a TS app that keeps its rules under .claude/rules/):
#   code: .claude/rules/typescript.md
#   testing: .claude/rules/testing.md
#   design-system: .claude/rules/design-system.md
#   frontend: .claude/rules/frontend.md
#   visual: .claude/rules/visual-regression.md
#   aesthetics: .claude/rules/aesthetic-quality.md
